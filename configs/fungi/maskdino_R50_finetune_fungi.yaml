# Fine-tune MaskDINO R50 on the fungi instance segmentation dataset.
# Start from a COCO-pretrained checkpoint, then fine-tune on fungi images.
#
# Usage:
#   python train_net.py --num-gpus 1 \
#     --config-file configs/fungi/maskdino_R50_finetune_fungi.yaml \
#     MODEL.WEIGHTS checkpoints/<coco_pretrained>.pth
#
# The dataset must be prepared first:
#   python datasets/prepare_fungi.py \
#     --db /path/to/sam3.db \
#     --images /path/to/session_images \
#     --out datasets/fungi

_BASE_: ../coco/instance-segmentation/maskdino_R50_bs16_50ep_3s.yaml

MODEL:
  SEM_SEG_HEAD:
    NUM_CLASSES: 1 # single class: fungus (no species classification)
  MaskDINO:
    INITIALIZE_BOX_TYPE: "no" # "bitmask" caused full-image-height anchors on fungi images (pre-sigmoid encoder masks cover large regions → inverse_sigmoid saturates → box regression stuck)

DATASETS:
  TRAIN: ("fungi_train",)
  TEST: ("fungi_val",)

SOLVER:
  # 47 train images, IMS_PER_BATCH=4 → 1 epoch ≈ 12 iterations
  # MAX_ITER=12000 ≈ 1000 epochs.
  IMS_PER_BATCH: 4 # 2 per GPU × 2 GPUs, or 4 on a single A100
  BASE_LR: 0.00001          # 1e-5: 1e-4 was too fast (overfits at step ~200); 1e-6 was too slow (barely moved at step 4000)
  MAX_ITER: 12000
  STEPS: (9600, 10800) # decay at 80% and 90% of training
  WARMUP_ITERS: 100
  CHECKPOINT_PERIOD: 500
  BACKBONE_MULTIPLIER: 0.0      # freeze backbone
  PIXEL_DECODER_MULTIPLIER: 0.0 # freeze pixel decoder
  PREDICTOR_MULTIPLIER: 0.0     # freeze transformer decoder attention+FFN; prediction heads stay trainable at BASE_LR
  CLIP_GRADIENTS:
    CLIP_VALUE: 0.01

INPUT:
  # Large source images (~2400×2400). Crop/resize to manageable size.
  IMAGE_SIZE: 1024
  MIN_SCALE: 0.5
  MAX_SCALE: 1.5
  MASK_FORMAT: "bitmask" # our annotations use RLE, not polygons
  RANDOM_FLIP: "horizontal"

TEST:
  EVAL_PERIOD: 200 # ~every 50 epochs

DATALOADER:
  NUM_WORKERS: 4 # increase for HPC (more CPU cores available)
