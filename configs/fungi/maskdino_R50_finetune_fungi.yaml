# Fine-tune MaskDINO R50 on the fungi instance segmentation dataset.
# Start from a COCO-pretrained checkpoint, then fine-tune on fungi images.
#
# Usage:
#   python train_net.py --num-gpus 1 \
#     --config-file configs/fungi/maskdino_R50_finetune_fungi.yaml \
#     MODEL.WEIGHTS checkpoints/<coco_pretrained>.pth
#
# The dataset must be prepared first:
#   python datasets/prepare_fungi.py \
#     --db /path/to/sam3.db \
#     --images /path/to/session_images \
#     --out datasets/fungi

_BASE_: ../coco/instance-segmentation/maskdino_R50_bs16_50ep_3s.yaml

MODEL:
  SEM_SEG_HEAD:
    NUM_CLASSES: 1   # single class: fungus (no species classification)
  MaskDINO:
    INITIALIZE_BOX_TYPE: "bitmask"   # use encoder mask-enhanced box proposals to initialize decoder queries

DATASETS:
  TRAIN: ("fungi_train",)
  TEST: ("fungi_val",)

SOLVER:
  # 15 train images, IMS_PER_BATCH=4 → 1 epoch ≈ 4 iterations
  # MAX_ITER=4000 ≈ 1000 epochs.
  IMS_PER_BATCH: 4          # 2 per GPU × 2 GPUs, or 4 on a single A100
  BASE_LR: 0.00005          # lower LR for fine-tuning (1/2 of default)
  MAX_ITER: 4000
  STEPS: (3200, 3600)       # decay at 80% and 90% of training
  WARMUP_ITERS: 50
  CHECKPOINT_PERIOD: 500
  BACKBONE_MULTIPLIER: 0.0  # fully freeze backbone — only 20 training samples
  CLIP_GRADIENTS:
    CLIP_VALUE: 0.1          # up from 0.01: was starving box branch of gradient signal

INPUT:
  # Large source images (~2400×2400). Crop/resize to manageable size.
  IMAGE_SIZE: 1024
  MIN_SCALE: 0.5
  MAX_SCALE: 1.5
  MASK_FORMAT: "bitmask"  # our annotations use RLE, not polygons
  RANDOM_FLIP: "horizontal"

TEST:
  EVAL_PERIOD: 200          # ~every 50 epochs

DATALOADER:
  NUM_WORKERS: 4            # increase for HPC (more CPU cores available)
